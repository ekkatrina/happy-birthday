<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>С Днём Рождения, Лика!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;max-width:430px;margin:0 auto;font-family:'Nunito',sans-serif;overflow-x:hidden;background:#12000d}
#scene{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 60% 0%,#3d0030 0%,#1a0010 50%,#0d0008 100%);overflow:hidden}
canvas#petals{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#main{position:relative;z-index:1;min-height:100vh;padding:0 0 40px}
.name-card{margin:0 16px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,160,200,0.22);border-radius:28px;padding:26px 22px 22px;text-align:center;box-shadow:0 8px 40px rgba(235,47,150,0.18),inset 0 1px 0 rgba(255,255,255,0.12)}
.name-chinese{font-size:34px;letter-spacing:8px;color:rgba(255,200,230,0.75);font-family:'Playfair Display',serif;margin-bottom:2px}
.name-main{font-family:'Playfair Display',serif;font-size:72px;font-weight:700;background:linear-gradient(135deg,#ffb3d9 0%,#ff69b4 40%,#ff1493 70%,#ffb3d9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;letter-spacing:-2px;filter:drop-shadow(0 4px 20px rgba(255,20,147,0.4))}
.name-sub{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,180,215,0.6);font-weight:600;margin-top:6px}
.section{margin:14px 16px 0}
.glass-card{background:rgba(255,255,255,0.065);backdrop-filter:blur(16px);border:1px solid rgba(255,160,200,0.18);border-radius:24px;padding:20px 22px;box-shadow:0 4px 24px rgba(235,47,150,0.08)}
.wish-text{font-size:15px;line-height:1.85;color:rgba(255,215,240,0.92);text-align:center;font-style:italic}
.candle-title{font-size:17px;font-weight:700;color:rgba(255,200,230,0.88);margin-bottom:14px;font-family:'Playfair Display',serif;text-align:center}
#candle-wrap{position:relative;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.cake-base{font-size:60px;user-select:none}
#flame-row{position:absolute;top:2px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:none}
.c-flame{font-size:20px;animation:fl 0.7s ease-in-out infinite alternate;opacity:0;transition:opacity 0.5s}
.c-flame.lit{opacity:1}
@keyframes fl{0%{transform:scale(1) rotate(-5deg)}100%{transform:scale(1.18) rotate(5deg)}}
#wish-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.09);border:1.5px solid rgba(255,160,200,0.25);border-radius:16px;font-family:'Nunito',sans-serif;font-size:14px;color:rgba(255,220,240,0.9);margin-bottom:12px;outline:none;transition:border-color 0.25s}
#wish-input::placeholder{color:rgba(255,160,200,0.35)}
#wish-input:focus{border-color:rgba(255,105,180,0.55)}
.btn-blow{width:100%;padding:15px;background:linear-gradient(135deg,#ff69b4,#c41d7f);color:#fff;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 24px rgba(196,29,127,0.4);transition:transform 0.15s}
.btn-blow:active{transform:scale(0.96)}
#wish-msg{margin-top:13px;font-size:14px;font-weight:700;color:#ff85ba;display:none;padding:13px;background:rgba(255,105,180,0.09);border-radius:14px;border:1px solid rgba(255,105,180,0.2);text-align:center;line-height:1.6}

/* Character bubble */
#char-bubble{position:fixed;z-index:50;bottom:0;left:50%;transform:translateX(-50%) translateY(120%);width:calc(100% - 32px);max-width:398px;background:rgba(18,0,13,0.94);backdrop-filter:blur(24px);border:1px solid rgba(255,105,180,0.28);border-radius:24px 24px 0 0;padding:16px 18px 28px;display:flex;flex-direction:row;align-items:center;gap:14px;box-shadow:0 -8px 40px rgba(235,47,150,0.2);transition:transform 0.4s cubic-bezier(0.22,1,0.36,1)}
#char-bubble.show{transform:translateX(-50%) translateY(0)}
#char-bubble img{width:62px;height:78px;object-fit:cover;border-radius:14px;border:2px solid rgba(255,105,180,0.35);flex-shrink:0}
.bubble-text{flex:1}
.bubble-name{font-size:11px;font-weight:800;color:rgba(255,140,190,0.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.bubble-msg{font-size:15px;font-weight:700;color:rgba(255,220,240,0.95);line-height:1.5}
.bubble-close{position:absolute;top:12px;right:14px;background:rgba(255,105,180,0.12);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;color:#ffb3d9;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Game trigger overlay */
#game-trigger{display:none;position:fixed;inset:0;z-index:150;align-items:center;justify-content:center;background:rgba(10,0,8,0.82);backdrop-filter:blur(10px)}
#game-trigger.show{display:flex}
.gt-box{background:linear-gradient(160deg,#280018,#150010);border:1px solid rgba(255,105,180,0.3);border-radius:28px;padding:32px 28px;text-align:center;max-width:340px;width:90%;box-shadow:0 24px 80px rgba(235,47,150,0.3)}
.gt-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#ffb3d9;margin-bottom:8px}
.gt-sub{font-size:14px;color:rgba(255,160,200,0.55);margin-bottom:24px;line-height:1.6}
.gt-btns{display:flex;flex-direction:column;gap:10px}
.gt-btn{padding:14px;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:transform 0.15s}
.gt-btn:active{transform:scale(0.96)}
.gt-btn-1{background:linear-gradient(135deg,#ff69b4,#c41d7f);color:#fff;box-shadow:0 4px 16px rgba(196,29,127,0.35)}
.gt-btn-2{background:linear-gradient(135deg,#4a2080,#1a0a40);color:#d4b8ff;box-shadow:0 4px 16px rgba(80,40,160,0.35)}
.gt-btn-3{background:linear-gradient(135deg,#2d6b2d,#0a2a0a);color:#a8e8a8;box-shadow:0 4px 16px rgba(40,100,40,0.35)}

/* Game overlay */
#game-overlay{display:none;position:fixed;inset:0;background:rgba(8,0,6,0.9);backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center}
#game-overlay.open{display:flex}
.game-sheet{width:100%;max-width:430px;background:linear-gradient(170deg,#200016,#120009);border:1px solid rgba(255,105,180,0.18);border-radius:28px 28px 0 0;padding:0 0 52px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.sheet-handle{width:44px;height:5px;border-radius:999px;background:rgba(255,105,180,0.25);margin:14px auto 0}
.game-header{padding:14px 20px 12px;border-bottom:1px solid rgba(255,105,180,0.12)}
.game-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:#ffb3d9}
.game-desc{font-size:12px;color:rgba(255,160,200,0.5);margin-top:3px}
.close-game{position:absolute;top:14px;right:14px;background:rgba(255,105,180,0.12);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;color:#ffb3d9;display:flex;align-items:center;justify-content:center}
#game-body{padding:14px 18px 0}
.score-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.06);border-radius:14px;padding:10px 16px;margin-bottom:12px;border:1px solid rgba(255,105,180,0.12)}
.sc-val{font-size:22px;font-weight:800;color:#ff85ba}
.sc-label{font-size:10px;color:rgba(255,160,200,0.45);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.sc-block{text-align:center}
.btn-pink{width:100%;padding:14px;background:linear-gradient(135deg,#ff69b4,#c41d7f);color:#fff;border:none;border-radius:16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(196,29,127,0.3);transition:transform 0.15s;margin-top:10px;display:block}
.btn-pink:active{transform:scale(0.97)}
.btn-alt{background:linear-gradient(135deg,#7b2d7b,#3d0050)}
.gover-box{text-align:center;padding:20px 0}
.gover-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#ff85ba;margin-bottom:6px}
.gover-sub{font-size:13px;color:rgba(255,160,200,0.55);margin-bottom:4px}
.cpiece{position:fixed;pointer-events:none;border-radius:2px;animation:cfall linear forwards;z-index:9999}
@keyframes cfall{0%{opacity:1;transform:translate(0,0) rotate(0deg)}100%{opacity:0;transform:translate(var(--cx),var(--cy)) rotate(720deg)}}
</style>
</head>

// === PETALS ===
(function(){
  const canvas=document.getElementById('petals');
  const ctx=canvas.getContext('2d');
  let W,H,petals=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const colors=['#ff85ba','#ffadd2','#ff69b4','#e8b4d8','#ff1493','#ffd6e8','#c41d7f'];
  for(let i=0;i<40;i++)petals.push(mkP());
  function mkP(top){return{x:Math.random()*W,y:top?-30:Math.random()*H,sz:5+Math.random()*10,sp:0.5+Math.random()*1.2,dr:(Math.random()-0.5)*0.5,rot:Math.random()*360,rs:(Math.random()-0.5)*2,col:colors[Math.floor(Math.random()*colors.length)],op:0.35+Math.random()*0.5};}
  function draw(){
    ctx.clearRect(0,0,W,H);
    petals.forEach(p=>{
      p.y+=p.sp;p.x+=p.dr+Math.sin(p.y/55)*0.3;p.rot+=p.rs;
      if(p.y>H+30)Object.assign(p,mkP(true),{x:Math.random()*W});
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.op;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.ellipse(0,0,p.sz/2,p.sz,Math.PI/4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// === CANDLE LOGIC ===
const flameEls=document.querySelectorAll('.c-flame');
const wishInput=document.getElementById('wish-input');
let flamesLit=false;
wishInput.addEventListener('input',()=>{
  const hasText=wishInput.value.trim().length>0;
  if(hasText&&!flamesLit){flamesLit=true;flameEls.forEach(f=>f.classList.add('lit'));}
  else if(!hasText&&flamesLit){flamesLit=false;flameEls.forEach(f=>f.classList.remove('lit'));}
});

function blowOutCandles(cb){
  flamesLit=false;
  flameEls.forEach((f,i)=>{
    setTimeout(()=>{f.classList.remove('lit');},i*120);
  });
  setTimeout(cb,600);
}
function relightCandles(){
  // gentle relight after delay
}

let blowCount=0;
const GAME_EVERY=3;
function tryBlow(){
  if(!wishInput.value.trim()){
    wishInput.style.borderColor='rgba(255,80,80,0.7)';
    setTimeout(()=>wishInput.style.borderColor='',1000);
    return;
  }
  blowCount++;
  blowOutCandles(()=>{
    wishInput.value='';
    if(blowCount%GAME_EVERY===0){
      showGameTrigger();
    } else {
      showWishMsg('🌟 Вселенная услышала твоё желание!');
    }
  });
}

}

// === CONFETTI ===
function confetti(cx,cy){
  const cols=['#ff85ba','#f759ab','#ffadd2','#eb2f96','#e8b4d8','#ff6eb4','#ffd6e8','#c41d7f'];
  for(let i=0;i<45;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    const a=Math.random()*Math.PI*2,d=70+Math.random()*230;
    const sz=4+Math.random()*7;
    el.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};--cx:${Math.cos(a)*d}px;--cy:${Math.sin(a)*d}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${0.8+Math.random()*1}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

let activeGame=null;

function closeGame(){
  document.getElementById('game-overlay').classList.remove('open');

  if(activeGame==='g3')clearG3();
  activeGame=null;
}
function onGameWin(){
  closeGame();
  showWishMsg('🏆 Испытание пройдено! Желание обязательно сбудется! ✨');
}

// GAME 1: WHACK GRID
// =====================
// 9 grid cells, images pop up, tap to hit non-Jimin chars
// Jimin = jimin1. Others = person2, person3, natsu, lucy, wanning, mozhan
const G1_CHARS=['person2','person3','natsu','lucy','wanning','mozhan'];
const G1_SAFE='jimin1';
let g1Timer=null,g1PopInt=null,g1State={};

function initG1(){
  document.getElementById('g-title').textContent='💜 Защити Чимина!';
  document.getElementById('g-desc').textContent='Нажимай на чужих! Не трогай Чимина!';
  document.getElementById('game-body').innerHTML=`
    <div class="score-row">
      <div class="sc-block"><div class="sc-label">Очки</div><div class="sc-val" id="g1s">0</div></div>
      <div class="sc-block"><div class="sc-label">Жизни</div><div class="sc-val" id="g1l">❤️❤️❤️</div></div>
      <div class="sc-block"><div class="sc-label">Время</div><div class="sc-val" id="g1t">60</div></div>
    </div>
    <div id="g1-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px"></div>
    <div id="g1-end" style="display:none" class="gover-box">
      <div class="gover-title" id="g1-res"></div>
      <button class="btn-pink" onclick="initG1()">Ещё раз 🔄</button>
      <button class="btn-pink btn-alt" onclick="onGameWin()" style="margin-top:8px">Засчитать победу 💜</button>
    </div>
  `;
  const grid=document.getElementById('g1-grid');
  for(let i=0;i<9;i++){
    const cell=document.createElement('div');
    cell.id='gc'+i;
    cell.style.cssText='aspect-ratio:1;border-radius:18px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,105,180,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;user-select:none';
    cell.addEventListener('click',()=>g1Tap(i));
    cell.addEventListener('touchstart',(e)=>{e.preventDefault();g1Tap(i);},{passive:false});
    grid.appendChild(cell);
  }
  g1State={score:0,lives:3,time:60,active:new Array(9).fill(null),lock:false,level:1};
  clearG1();
  g1PopInt=setInterval(popG1,900);
  g1Timer=setInterval(()=>{
    g1State.time--;
    const el=document.getElementById('g1t');
    if(el)el.textContent=g1State.time;
    if(g1State.time<=0)endG1();
  },1000);
}

function popG1(){
  const s=g1State;
  // Level based on TIME elapsed (0-60s), not score — smoother ramp
  const elapsed=60-s.time;
  const level=Math.floor(elapsed/10); // level 0-6 over 60 seconds

  // Adjust spawn interval: starts slow (1200ms), ends at 600ms
  const targetIv=Math.max(600,1200-level*100);
  if(s._targetIv!==targetIv){
    s._targetIv=targetIv;
    clearInterval(g1PopInt);
    g1PopInt=setInterval(popG1,targetIv);
  }

  // Max 1 pop early on, up to 2 in last third
  const pops=level>=4?2:1;

  for(let p=0;p<pops;p++){
    const empty=[...Array(9).keys()].filter(i=>!s.active[i]);
    if(!empty.length)break;
    const idx2=empty[Math.floor(Math.random()*empty.length)];

    // Jimin chance: 25% at start, 12% at end
    const isSafe=Math.random()<Math.max(0.12,0.25-level*0.02);
    const charKey=isSafe?G1_SAFE:G1_CHARS[Math.floor(Math.random()*G1_CHARS.length)];
    s.active[idx2]=charKey;

    const cell=document.getElementById('gc'+idx2);
    if(!cell)continue;

    // Show duration: enemies visible 2.2s→1.2s over time; Jimin always 2s
    const showDur=isSafe
      ?2000
      :Math.max(1200,2200-level*170);

    cell.style.position='relative';
    cell.innerHTML=`<img src="${IMGS[charKey]}" style="width:100%;height:100%;object-fit:cover;border-radius:14px;animation:popIn 0.15s ease" alt="">
      <div style="position:absolute;bottom:2px;left:0;right:0;height:3px;background:rgba(0,0,0,0.3);border-radius:2px">
        <div style="height:100%;background:${isSafe?'#7c4dff':'#ff4444'};border-radius:2px;animation:timerBar ${showDur}ms linear forwards"></div>
      </div>`;

    if(!document.querySelector('style[data-popin]')){
      const st=document.createElement('style');
      st.textContent='@keyframes popIn{0%{transform:scale(0.5)}60%{transform:scale(1.08)}100%{transform:scale(1)}}@keyframes timerBar{0%{width:100%}100%{width:0%}}';
      st.setAttribute('data-popin','1');document.head.appendChild(st);
    }

    const ci=idx2,ck=charKey;
    setTimeout(()=>{
      if(s.active[ci]!==ck)return;
      s.active[ci]=null;
      const c=document.getElementById('gc'+ci);
      if(c)c.innerHTML='';
      // Penalty only for escaped enemy (not Jimin)
      if(ck!==G1_SAFE){
        s.lives=Math.max(0,s.lives-1);
        const el=document.getElementById('g1l');
        if(el)el.textContent='❤️'.repeat(s.lives);
        const grid=document.getElementById('g1-grid');
        if(grid){grid.style.outline='3px solid rgba(255,50,50,0.7)';setTimeout(()=>{if(grid)grid.style.outline='';},350);}
        if(s.lives===0)endG1();
      }
    },showDur);
  }
}

function g1Tap(i){
  const s=g1State;
  if(!s.active[i])return;
  const key=s.active[i];
  s.active[i]=null;
  const cell=document.getElementById('gc'+i);
  if(!cell)return;
  if(key===G1_SAFE){
    cell.innerHTML='<div style="font-size:30px;text-align:center">😢</div>';
    setTimeout(()=>{if(cell)cell.innerHTML='';},400);
    s.lives=Math.max(0,s.lives-1);
    const el=document.getElementById('g1l');
    if(el)el.textContent='❤️'.repeat(s.lives)||(s.lives===0?'💔':'');
    if(s.lives===0){endG1();return;}
  }else{
    // hit flash
    cell.style.background='rgba(255,80,80,0.4)';
    cell.innerHTML='<div style="font-size:26px;text-align:center">💥</div>';
    setTimeout(()=>{if(cell){cell.innerHTML='';cell.style.background='rgba(255,255,255,0.06)';}  },280);
    s.score+=10;
    const el=document.getElementById('g1s');
    if(el)el.textContent=s.score;
  }
}

function endG1(){
  clearG1();
  const s=g1State;
  const grid=document.getElementById('g1-grid');
  const end=document.getElementById('g1-end');
  if(grid)grid.style.display='none';
  if(end){
    end.style.display='block';
    const r=document.getElementById('g1-res');
    if(r)r.textContent=s.score>=80?`🏆 ${s.score} очков! Чимин в безопасности!`:s.score>=40?`🌟 ${s.score} очков!`:`💜 ${s.score} очков!`;
    confetti(window.innerWidth/2,window.innerHeight/2);
  }
}
function clearG1(){clearInterval(g1PopInt);clearInterval(g1Timer);}

// GAME 2: CARRY MO ZHAN
// =====================
let g2Anim=null,g2State={};
const G2W=390,G2H=400;

function initG2(){
  document.getElementById('g-title').textContent='🎋 Помоги Чу Ваньнину!';
  document.getElementById('g-desc').textContent='Двигай пальцем — уворачивайся от преград!';
  document.getElementById('game-body').innerHTML=`
    <div class="score-row">
      <div class="sc-block"><div class="sc-label">Ступени</div><div class="sc-val" id="g2h">0</div></div>
      <div class="sc-block"><div class="sc-label">Жизни</div><div class="sc-val" id="g2l">❤️❤️❤️</div></div>
    </div>
    <canvas id="g2c" width="390" height="400" style="width:100%;border-radius:20px;touch-action:none;display:block"></canvas>
    <div id="g2-end" style="display:none" class="gover-box">
      <div class="gover-title" id="g2-res"></div>
      <button class="btn-pink" onclick="initG2()">Ещё раз 🔄</button>
      <button class="btn-pink btn-alt" onclick="onGameWin()" style="margin-top:8px">Засчитать! 💜</button>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:12px;color:rgba(255,160,200,0.4)">Тяни пальцем влево-вправо</div>
  `;
  clearG2();
  const wImg=new Image(),mImg=new Image();
  wImg.src=IMGS.wanning;mImg.src=IMGS.mozhan;
  let loaded=0;
  const onLoad=()=>{if(++loaded===2)startG2(wImg,mImg);};
  wImg.onload=onLoad;mImg.onload=onLoad;
}

function startG2(wImg,mImg){
  const canvas=document.getElementById('g2c');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const s={px:G2W/2-25,tx:G2W/2-25,pw:50,ph:70,py:G2H-90,lives:3,height:0,obstacles:[],oTimer:0,done:false,scrollY:0};
  g2State=s;

  function getX(e,r){
    const t=e.touches?e.touches[0]:e;
    return(t.clientX-r.left)*(G2W/r.width)-s.pw/2;
  }
  function setTarget(e){
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    s.tx=Math.max(0,Math.min(G2W-s.pw,getX(e,r)));
  }
  canvas.addEventListener('touchmove',setTarget,{passive:false});
  canvas.addEventListener('touchstart',setTarget,{passive:false});
  canvas.addEventListener('mousemove',e=>{if(e.buttons)setTarget(e);});

  // obstacle types
  const OBS_TYPES=[
    {w:30,h:30,col:'#8B7355',label:'🪨'},  // rock
    {w:24,h:40,col:'#5a3a1a',label:'🪵'},  // log
    {w:20,h:20,col:'#4a90d9',label:'💧'},  // water
    {w:50,h:18,col:'#6b4226',label:''},    // wide plank
    {w:16,h:50,col:'#7a5230',label:''},    // pillar
  ];

  function spawnObs(){
    const t=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
    s.obstacles.push({
      x:10+Math.random()*(G2W-t.w-20),y:-50,
      w:t.w,h:t.h,col:t.col,label:t.label,
      vx:(Math.random()-0.5)*(2+s.height/300),
      vy:2.5+Math.random()*2+s.height/350,
    });
  }

  function drawBg(){
    // Staircase / mountain feel - scroll with height
    const scroll=s.scrollY%120;
    // Sky gradient based on height
    const progress=Math.min(s.height/800,1);
    const r1=Math.round(20+progress*10),g1=Math.round(0+progress*5),b1=Math.round(30+progress*20);
    const grd=ctx.createLinearGradient(0,0,0,G2H);
    grd.addColorStop(0,`rgb(${r1},${g1},${b1})`);
    grd.addColorStop(1,`rgb(${Math.round(r1*0.5)},${g1},${Math.round(b1*0.5)})`);
    ctx.fillStyle=grd;ctx.fillRect(0,0,G2W,G2H);

    // Stars appear at height
    if(s.height>200){
      ctx.fillStyle=`rgba(255,255,255,${Math.min((s.height-200)/400,0.7)})`;
      [[30,20],[80,50],[150,15],[220,35],[310,10],[370,40],[100,80],[280,60]].forEach(([sx,sy])=>{
        ctx.beginPath();ctx.arc(sx,(sy+scroll)%G2H,1.2,0,Math.PI*2);ctx.fill();
      });
    }

    // Mountain silhouette scrolling
    ctx.fillStyle=`rgba(40,20,60,${0.4+progress*0.3})`;
    for(let i=0;i<5;i++){
      const mx=i*90-scroll*0.3;
      const mh=60+i*20;
      ctx.beginPath();
      ctx.moveTo(mx,G2H);ctx.lineTo(mx+45,G2H-mh);ctx.lineTo(mx+90,G2H);
      ctx.fill();
    }

    // Ground steps / stairs
    ctx.fillStyle='rgba(80,50,30,0.35)';
    for(let i=0;i<6;i++){
      const gy=G2H-30-i*60+(scroll%60);
      ctx.fillRect(i*15,gy,G2W-i*30,8);
    }

    // Height marker
    const pct=Math.min(s.height/3000,1);
    ctx.fillStyle='rgba(255,180,220,0.15)';
    ctx.fillRect(G2W-8,0,8,G2H*(1-pct));
    ctx.fillStyle='rgba(255,100,180,0.6)';
    ctx.fillRect(G2W-8,G2H*(1-pct),8,G2H*pct);
    ctx.fillStyle='rgba(255,200,230,0.8)';
    ctx.font='bold 9px sans-serif';ctx.textAlign='right';
    ctx.fillText(`${Math.round(s.height/8)}м`,G2W-12,G2H*(1-pct)-3);

    // Goal
    if(pct>0.97){
      ctx.fillStyle='rgba(255,215,0,0.6)';
      ctx.fillRect(0,0,G2W,20);
      ctx.fillStyle='rgba(255,215,0,1)';ctx.font='bold 12px sans-serif';
      ctx.textAlign='center';ctx.fillText('🏮 ВЕРШИНА!',G2W/2,14);
    }
    // Difficulty warning
    if(s.height>1500&&s.height%300<30){
      ctx.fillStyle=`rgba(255,100,100,${0.5+Math.sin(s.height/5)*0.4})`;
      ctx.font='bold 11px sans-serif';ctx.textAlign='center';
      ctx.fillText('⚠️ БЫСТРЕЕ!',G2W/2,G2H/2);
    }
  }

  function loop(){
    if(!document.getElementById('g2c'))return;
    s.scrollY+=1.5;
    ctx.clearRect(0,0,G2W,G2H);
    drawBg();

    s.px+=(s.tx-s.px)*0.15;
    s.height+=1;
    const hEl=document.getElementById('g2h');
    if(hEl)hEl.textContent=`${s.height} ст`;

    // Obstacles
    s.oTimer++;
    const progress=Math.min(s.height/3000,1);
    // spawn multiple obstacles at once at high levels
    const spawnRate=Math.max(10,50-Math.floor(s.height/80));
    if(s.oTimer>spawnRate){
      const batch=s.height>1500?3:s.height>800?2:1;
      for(let b=0;b<batch;b++)spawnObs();
      s.oTimer=0;
    }
    s.obstacles.forEach(o=>{
      o.y+=o.vy;o.x+=o.vx;
      if(o.x<0||o.x>G2W-o.w)o.vx*=-1;
      // draw
      ctx.fillStyle=o.col;
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,6);ctx.fill();
      if(o.label){ctx.font=`${Math.min(o.w,o.h)-4}px serif`;ctx.textAlign='center';ctx.fillText(o.label,o.x+o.w/2,o.y+o.h*0.75);}
      // collision
      const margin=6;
      if(o.y+o.h>s.py+margin&&o.y<s.py+s.ph-margin&&o.x+o.w>s.px+margin&&o.x<s.px+s.pw-margin&&!o.hit){
        o.hit=true;
        s.lives=Math.max(0,s.lives-1);
        const lEl=document.getElementById('g2l');
        if(lEl)lEl.textContent='❤️'.repeat(s.lives);
        if(s.lives===0){endG2(false);return;}
      }
    });
    s.obstacles=s.obstacles.filter(o=>o.y<G2H+40);

    // Player
    if(mImg)ctx.drawImage(mImg,s.px+8,s.py-38,34,40);
    if(wImg)ctx.drawImage(wImg,s.px,s.py,s.pw,s.ph);

    if(s.height>=3000){endG2(true);return;}
    g2Anim=requestAnimationFrame(loop);
  }
  loop();
}

function endG2(won){
  clearG2();
  const c=document.getElementById('g2c'),e=document.getElementById('g2-end'),r=document.getElementById('g2-res');
  if(c)c.style.display='none';
  if(e)e.style.display='block';
  if(r)r.textContent=won?'🎉 Вершина достигнута! Чу Ваньнин доволен... немного.':'💔 Чу Ваньнин упал. Но он непреклонен!';
  if(won)confetti(window.innerWidth/2,window.innerHeight/3);
}
function clearG2(){cancelAnimationFrame(g2Anim);}

// =====================
// GAME 3: WHIP STUDENTS
// =====================
let g3Anim=null,g3State={};
const G3W=390,G3H=380;
const FLOWER_LIST=['🌸','🌺','🌹','🌼','🌻','🌷'];

function initG3(){
  document.getElementById('g-title').textContent='📜 Наказание непослушных!';
  document.getElementById('g-desc').textContent='Бей золотой плетью тех, у кого цветок! Берегись невиновных!';
  document.getElementById('game-body').innerHTML=`
    <div class="score-row">
      <div class="sc-block"><div class="sc-label">Очки</div><div class="sc-val" id="g3s">0</div></div>
      <div class="sc-block"><div class="sc-label">Жизни</div><div class="sc-val" id="g3l">❤️❤️❤️</div></div>
      <div class="sc-block"><div class="sc-label">Время</div><div class="sc-val" id="g3t">35</div></div>
    </div>
    <canvas id="g3c" width="390" height="380" style="width:100%;border-radius:20px;touch-action:none;display:block"></canvas>
    <div id="g3-end" style="display:none" class="gover-box">
      <div class="gover-title" id="g3-res"></div>
      <button class="btn-pink" onclick="initG3()">Ещё раз 🔄</button>
      <button class="btn-pink" style="background:linear-gradient(135deg,#2d6b2d,#0a2a0a);margin-top:8px" onclick="onGameWin()">Засчитать! 💜</button>
    </div>
  `;
  const wImg=new Image();wImg.src=IMGS.wanning2;
  wImg.onload=()=>startG3(wImg);
}

function startG3(wImg){
  clearG3();
  const canvas=document.getElementById('g3c');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const s={score:0,lives:3,time:35,students:[],whip:null,done:false};
  g3State=s;

  const timerInt=setInterval(()=>{
    s.time--;const el=document.getElementById('g3t');
    if(el)el.textContent=s.time;
    if(s.time<=0)endG3();
  },1000);
  s.timerInt=timerInt;

  function spawnStudent(){
    if(s.done)return;
    const elapsed=35-s.time;
    const level=1+Math.floor(elapsed/6); // level up every 6 sec
    const maxStudents=Math.min(5+level*2,16);
    if(s.students.length>=maxStudents)return;
    const flowerChance=Math.min(0.35+level*0.1,0.75);
    const hasFlower=Math.random()<flowerChance;
    const speed=0.5+level*0.2;
    const now2=Date.now();
    const st={
      x:20+Math.random()*(G3W-80),y:20+Math.random()*(G3H-130),
      w:44,h:66,hasFlower,
      flower:FLOWER_LIST[Math.floor(Math.random()*FLOWER_LIST.length)],
      alive:true,hit:false,hitTimer:0,flash:0,
      vx:(Math.random()-0.5)*speed*2,vy:(Math.random()-0.5)*speed*2,
      skinTone:['#f5d5a5','#e8b890','#c8906a','#f0c4a0'][Math.floor(Math.random()*4)],
      clothColor:['#3a5a8a','#5a3a8a','#3a7a5a','#8a5a3a','#7a3a3a'][Math.floor(Math.random()*5)],
      hairColor:['#2a1a0a','#5a3a10','#1a1a3a','#0a2a0a'][Math.floor(Math.random()*4)],
      spawnTime:now2,
      // innocent: vanish faster at higher levels
      vanishAfter:hasFlower?null:(Math.max(1200,2500-level*200)+Math.random()*500),
      penaltyAfter:hasFlower?(Math.max(1800,3000-level*150)):null,
      penaltyDone:false,fadeAlpha:1,warning:false,
    };
    s.students.push(st);
    // Spawn extra student at high levels
    if(level>=4&&Math.random()<0.4)s.students.push({...st,x:20+Math.random()*(G3W-80),y:20+Math.random()*(G3H-130),spawnTime:now2,vx:(Math.random()-0.5)*speed*2,vy:(Math.random()-0.5)*speed*2,hasFlower:Math.random()<flowerChance,penaltyDone:false,warning:false,fadeAlpha:1});
  }
  const spawnInterval=()=>Math.max(350,650-Math.max(0,35-s.time)*15);
  // Adaptive spawn interval: starts 600ms, drops to 250ms
  let _spawnIv=600;
  const spawnInt=setInterval(()=>{
    const elapsed2=35-s.time;
    _spawnIv=Math.max(220,600-elapsed2*12);
    spawnStudent();
  },300);
  s.spawnInt=spawnInt;

  // tap / click
  function hitAt(x,y){
    // Whip effect from Wanning position (bottom right)
    s.whip={sx:G3W-55,sy:G3H-45,ex:x,ey:y,t:18};
    let didHit=false;
    s.students.forEach(st=>{
      if(!st.alive||st.hit)return;
      if(x>=st.x&&x<=st.x+st.w&&y>=st.y&&y<=st.y+st.h){
        st.hit=true;st.hitTimer=0;didHit=true;
        if(st.hasFlower){
          st.flash=15;
          s.score+=15;const el=document.getElementById('g3s');
          if(el)el.textContent=s.score;
        }else{
          st.flash=-15;// negative = wrong hit (red)
          s.lives=Math.max(0,s.lives-1);
          const el=document.getElementById('g3l');
          if(el)el.textContent='❤️'.repeat(s.lives);
          if(s.lives===0){endG3();return;}
        }
      }
    });
  }
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const t=e.changedTouches[0];
    hitAt((t.clientX-r.left)*(G3W/r.width),(t.clientY-r.top)*(G3H/r.height));
  },{passive:false});
  canvas.addEventListener('click',e=>{
    const r=canvas.getBoundingClientRect();
    hitAt((e.clientX-r.left)*(G3W/r.width),(e.clientY-r.top)*(G3H/r.height));
  });

  function drawStudent(st){
    const{x,y,w,h,skinTone,clothColor,hairColor,hasFlower,flower,hit,hitTimer,flash,fadeAlpha}=st;
    ctx.save();
    if(fadeAlpha!==undefined&&fadeAlpha<1)ctx.globalAlpha=Math.min(ctx.globalAlpha,fadeAlpha);
    // flash effect
    if(flash>0){ctx.globalAlpha=Math.min(ctx.globalAlpha,0.5+Math.sin(hitTimer*0.8)*0.4);}
    else if(flash<0){ctx.globalAlpha=0.4;}
    
    // body
    ctx.fillStyle=clothColor;
    ctx.beginPath();ctx.roundRect(x+4,y+26,w-8,h-26,6);ctx.fill();
    
    // head
    ctx.fillStyle=skinTone;
    ctx.beginPath();ctx.arc(x+w/2,y+17,13,0,Math.PI*2);ctx.fill();
    
    // hair
    ctx.fillStyle=hairColor;
    ctx.beginPath();ctx.arc(x+w/2,y+9,11,Math.PI,0);ctx.fill();
    ctx.fillRect(x+w/2-11,y+8,22,8);
    
    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(x+w/2-5,y+16,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+5,y+16,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(x+w/2-5,y+16,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w/2+5,y+16,1.5,0,Math.PI*2);ctx.fill();

    // hands/arms
    ctx.fillStyle=skinTone;
    ctx.beginPath();ctx.arc(x+2,y+38,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+w-2,y+38,6,0,Math.PI*2);ctx.fill();

    // flower badge
    if(hasFlower){
      ctx.font='16px serif';ctx.textAlign='center';
      ctx.fillText(flower,x+w/2,y+h-8);
    }
    
    // hit flash overlay
    if(hit&&flash!==0){
      ctx.fillStyle=flash>0?'rgba(255,215,0,0.4)':'rgba(255,50,50,0.4)';
      ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();
      // spark lines for hit
      if(flash>0){
        ctx.strokeStyle='rgba(255,215,0,0.8)';ctx.lineWidth=1.5;
        for(let i=0;i<5;i++){
          const a=i*72*Math.PI/180;
          ctx.beginPath();
          ctx.moveTo(x+w/2,y+h/2);
          ctx.lineTo(x+w/2+Math.cos(a)*20,y+h/2+Math.sin(a)*20);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  // Gold whip drawing
  function drawWhip(wh){
    if(!wh)return;
    const t=wh.t/18;
    // Curved whip path
    const mx=(wh.sx+wh.ex)/2-30,my=(wh.sy+wh.ey)/2-50;
    ctx.save();
    ctx.strokeStyle=`rgba(255,215,0,${t*0.9})`;
    ctx.lineWidth=2.5;
    ctx.shadowColor='rgba(255,200,50,0.7)';
    ctx.shadowBlur=8;
    ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.moveTo(wh.sx,wh.sy);
    ctx.quadraticCurveTo(mx,my,wh.ex,wh.ey);
    ctx.stroke();
    // Tip spark
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(255,215,0,${t})`;
    ctx.beginPath();ctx.arc(wh.ex,wh.ey,4*t,0,Math.PI*2);ctx.fill();
    // Leaf decorations on whip
    ctx.fillStyle=`rgba(100,200,80,${t*0.8})`;
    for(let i=0;i<3;i++){
      const bt=(i+1)/4;
      const px=wh.sx+(mx-wh.sx)*bt*2,py=wh.sy+(my-wh.sy)*bt*2;
      ctx.beginPath();ctx.ellipse(px,py,5,3,Math.PI/3*i,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
    wh.t--;
    if(wh.t<=0)s.whip=null;
  }

  function loop(){
    if(!document.getElementById('g3c'))return;
    ctx.clearRect(0,0,G3W,G3H);

    // classroom bg
    ctx.fillStyle='#0d1a0d';ctx.fillRect(0,0,G3W,G3H);
    // wood floor
    const floorGrd=ctx.createLinearGradient(0,G3H-50,0,G3H);
    floorGrd.addColorStop(0,'#3a2010');floorGrd.addColorStop(1,'#2a1808');
    ctx.fillStyle=floorGrd;ctx.fillRect(0,G3H-50,G3W,50);
    // floor planks
    ctx.strokeStyle='rgba(80,50,20,0.5)';ctx.lineWidth=1;
    for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(i*55,G3H-50);ctx.lineTo(i*55,G3H);ctx.stroke();}
    // wall decoration
    ctx.fillStyle='rgba(60,100,60,0.15)';
    for(let i=0;i<4;i++){ctx.fillRect(20+i*90,10,60,30);}

    // Students
    const now=Date.now();
    s.students.forEach(st=>{
      if(!st.alive)return;
      // Innocent student: vanish after 2-3s
      if(!st.hasFlower&&st.vanishAfter&&!st.hit){
        const age=now-st.spawnTime;
        if(age>st.vanishAfter){st.alive=false;return;}
        // fade out in last 600ms
        st.fadeAlpha=age>st.vanishAfter-600?1-(age-(st.vanishAfter-600))/600:1;
      } else {
        st.fadeAlpha=1;
      }
      // Flower student: penalty if not hit within 3s
      if(st.hasFlower&&st.penaltyAfter&&!st.hit&&!st.penaltyDone){
        const age=now-st.spawnTime;
        if(age>st.penaltyAfter){
          st.penaltyDone=true;st.alive=false;
          s.lives=Math.max(0,s.lives-1);
          const el=document.getElementById('g3l');
          if(el)el.textContent='❤️'.repeat(s.lives);
          if(s.lives===0){endG3();return;}
        } else if(age>st.penaltyAfter-800){
          // warning pulse
          st.warning=true;
        }
      }
      st.x+=st.vx;st.y+=st.vy;
      if(st.x<0||st.x>G3W-st.w)st.vx*=-1;
      if(st.y<0||st.y>G3H-st.h-50)st.vy*=-1;
      if(st.flash>0)st.flash--;else if(st.flash<0)st.flash++;
      // Warning ring (drawn before student, no alpha)
      if(st.warning){
        ctx.save();
        ctx.strokeStyle=`rgba(255,80,80,${0.5+Math.sin(Date.now()/100)*0.5})`;
        ctx.lineWidth=3;ctx.beginPath();
        ctx.roundRect(st.x-4,st.y-4,st.w+8,st.h+8,10);ctx.stroke();
        ctx.restore();
      }
      drawStudent(st);
      if(st.hit){st.hitTimer++;if(st.hitTimer>14)st.alive=false;}
    });
    s.students=s.students.filter(st=>st.alive||st.hitTimer<=14);

    // Whip
    drawWhip(s.whip);

    // Wanning (teacher)
    if(wImg)ctx.drawImage(wImg,G3W-68,G3H-88,52,72);

    g3Anim=requestAnimationFrame(loop);
  }
  loop();
}

function endG3(){
  clearG3();
  const s=g3State;
  const c=document.getElementById('g3c'),e=document.getElementById('g3-end'),r=document.getElementById('g3-res');
  if(c)c.style.display='none';
  if(e)e.style.display='block';
  if(r)r.textContent=s.score>=105?`🏆 ${s.score} — дисциплина восстановлена!`:s.score>=60?`✨ ${s.score} — Ваньнин почти доволен!`:`😤 ${s.score} — ещё есть куда расти!`;
  if(s.score>=60)confetti(window.innerWidth/2,window.innerHeight/3);
}
function clearG3(){cancelAnimationFrame(g3Anim);clearInterval(g3State.timerInt);clearInterval(g3State.spawnInt);}
</script>
